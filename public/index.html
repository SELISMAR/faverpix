<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="description" content="FaverPix — Preveja. Ganhe. Repita. Aposte em política, futebol e cripto." />

    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />

    <!-- Open Graph (WhatsApp, Instagram preview) -->
    <meta property="og:title" content="FaverPix — Mercado de Previsões" />
    <meta property="og:description" content="Aposte em política, futebol e cripto. Ganhe R$10 de bônus ao criar conta!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://faverpix.vercel.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FaverPix" />
    <meta name="twitter:description" content="Preveja. Ganhe. Repita." />

    <title>FaverPix — Mercado de Previsões</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0f1117;
        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
        max-width: 480px;
        margin: 0 auto;
      }
      /* Loading screen */
      #loading {
        position: fixed;
        inset: 0;
        background: #0f1117;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
      }
      #loading .logo {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: linear-gradient(135deg, #00c896, #1d4ed8);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        animation: pulse 1.5s infinite;
      }
      #loading h1 {
        font-size: 28px;
        font-weight: 900;
        color: #00c896;
        letter-spacing: -0.5px;
      }
      #loading h1 span { color: #3b82f6; }
      #loading p { font-size: 13px; color: #6b7280; }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <!-- Loading enquanto o React carrega -->
    <div id="loading">
      <div class="logo">📈</div>
      <h1>Faver<span>Pix</span></h1>
      <p>Carregando...</p>
    </div>

    <div id="root"></div>

    <script>
      // Remove loading quando o React montar
      window.addEventListener('load', () => {
        setTimeout(() => {
          const el = document.getElementById('loading');
          if (el) el.style.display = 'none';
        }, 500);
      });
    </script>
  </body>
</html>
